<!DOCTYPE html>
<html>

<head>
  <script src="./popup.js" defer></script>
  <style>
    :root {
      --popup-bg: #121212;
      --popup-panel: #252525;
      --popup-panel-2: #2a2a2a;
      --popup-border: #ffffff28;
      --popup-text: #ffffff;
      --popup-muted: #ffffffbe;
      --popup-accent: #098b4a;
      --popup-accent-text: #ffffff;
      --popup-shadow: rgba(0, 0, 0, 0.35);
    }

    body {
      width: 280px;
      min-height: 400px;
      padding: 10px;
      text-align: center;
      background: var(--popup-bg);
      color: var(--popup-text);
      font-family: system-ui, sans-serif;
    }

    .setting-row {
      margin: 14px 0;
      text-align: left;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .mode-tabs button {
      border: 1px solid var(--popup-border);
      border-radius: 6px;
      padding: 8px;
      background: var(--popup-panel);
      color: var(--popup-text);
      font-weight: 650;
      cursor: pointer;
    }

    .mode-tabs button.active {
      border-color: var(--popup-accent);
      background: var(--popup-accent);
      color: var(--popup-accent-text);
    }

    .setting-row label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--popup-muted);
    }

    .setting-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid var(--popup-border);
      background: var(--popup-panel);
      color: var(--popup-text);
    }

    .setting-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .setting-actions button {
      border: 0;
      border-radius: 6px;
      padding: 7px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-weight: 600;
      cursor: pointer;
    }

    .full-settings-btn {
      width: 100%;
      margin: 10px 0 4px;
      border: 1px solid var(--popup-border);
      border-radius: 8px;
      padding: 9px;
      background: var(--popup-panel-2);
      color: var(--popup-text);
      font-weight: 750;
      cursor: pointer;
    }

    .full-settings-btn:hover {
      background: color-mix(in srgb, var(--popup-accent) 22%, var(--popup-panel-2));
    }

    .mode-panel[hidden] {
      display: none;
    }

    #hubStatus {
      min-height: 16px;
      margin-top: 5px;
      font-size: 11px;
      color: var(--popup-muted);
    }

    .update-card {
      margin: 12px 0;
      padding: 10px;
      border: 1px solid var(--popup-border);
      border-radius: 8px;
      background: var(--popup-panel);
      box-shadow: 0 8px 24px var(--popup-shadow);
      text-align: left;
    }

    .update-card[hidden] {
      display: none;
    }

    .update-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 750;
    }

    .update-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 2px 7px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-size: 10px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .update-body {
      margin: 0 0 8px;
      color: var(--popup-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .update-list {
      margin: 0 0 9px;
      padding-left: 17px;
      color: var(--popup-text);
      font-size: 11px;
      line-height: 1.35;
    }

    .update-list li {
      margin: 3px 0;
    }

    .update-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .update-actions button {
      border: 0;
      border-radius: 6px;
      padding: 7px 9px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-weight: 700;
      cursor: pointer;
    }

    .update-actions .link-button {
      background: transparent;
      color: var(--popup-muted);
      padding-inline: 0;
    }
  </style>
</head>

<body>
  <h1>Vortex Web</h1>
    <p id="extensionVersion">Version</p>
    <h3>
      Settings:
    </h3>
    <div id="settings">
      <div class="mode-tabs">
        <button id="hostedRelayBtn" type="button">Hosted</button>
        <button id="localRelayBtn" type="button">Local</button>
      </div>

      <div id="hostedPanel" class="setting-row mode-panel">
        <label for="licenseKey">License key</label>
        <input id="licenseKey" type="password" autocomplete="off" placeholder="Optional supporter/developer key">
      </div>

      <div id="localPanel" class="mode-panel" hidden>
        <div class="setting-row">
          <label for="hubUrl">Local relay URL</label>
          <input id="hubUrl" placeholder="ws://127.0.0.1:27822/ws">
        </div>
      </div>

      <div id="hubStatus"></div>

      <button id="openSettingsBtn" class="full-settings-btn" type="button">Open full settings</button>

      <div id="updateCard" class="update-card" hidden>
        <div class="update-header">
          <span id="updateTitle">Update available</span>
          <span id="updatePill" class="update-pill">New</span>
        </div>
        <p id="updateBody" class="update-body"></p>
        <ul id="updateList" class="update-list"></ul>
        <div class="update-actions">
          <button id="openUpdateBtn" type="button">Open repo</button>
          <button id="dismissUpdateBtn" class="link-button" type="button">Dismiss</button>
        </div>
      </div>

    </div>
</body>

</html>
