<!DOCTYPE html>
<html>

<head>
  <script src="./popup.js" defer></script>
  <style>
    :root {
      --popup-bg: #121212;
      --popup-panel: #252525;
      --popup-panel-2: #2a2a2a;
      --popup-border: #ffffff28;
      --popup-text: #ffffff;
      --popup-muted: #ffffffbe;
      --popup-accent: #098b4a;
      --popup-accent-text: #ffffff;
      --popup-shadow: rgba(0, 0, 0, 0.35);
    }

    html[theme='light'] {
      --popup-bg: #ffffff;
      --popup-panel: #ececec;
      --popup-panel-2: #dbdbdb;
      --popup-border: #00000028;
      --popup-text: #000000;
      --popup-muted: #000000be;
      --popup-accent: #098b4a;
      --popup-accent-text: #ffffff;
      --popup-shadow: rgba(0, 0, 0, 0.12);
    }

    body {
      width: 280px;
      min-height: 400px;
      padding: 10px;
      text-align: center;
      background: var(--popup-bg);
      color: var(--popup-text);
      font-family: system-ui, sans-serif;
    }

    .setting-row {
      margin: 14px 0;
      text-align: left;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .mode-tabs button {
      border: 1px solid var(--popup-border);
      border-radius: 6px;
      padding: 8px;
      background: var(--popup-panel);
      color: var(--popup-text);
      font-weight: 650;
      cursor: pointer;
    }

    .mode-tabs button.active {
      border-color: var(--popup-accent);
      background: var(--popup-accent);
      color: var(--popup-accent-text);
    }

    .setting-row label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--popup-muted);
    }

    .setting-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid var(--popup-border);
      background: var(--popup-panel);
      color: var(--popup-text);
    }

    .setting-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .setting-actions button {
      border: 0;
      border-radius: 6px;
      padding: 7px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-weight: 600;
      cursor: pointer;
    }

    .mode-panel[hidden] {
      display: none;
    }

    #hubStatus {
      min-height: 16px;
      margin-top: 5px;
      font-size: 11px;
      color: var(--popup-muted);
    }

    .update-card {
      margin: 12px 0;
      padding: 10px;
      border: 1px solid var(--popup-border);
      border-radius: 8px;
      background: var(--popup-panel);
      box-shadow: 0 8px 24px var(--popup-shadow);
      text-align: left;
    }

    .update-card[hidden] {
      display: none;
    }

    .update-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 750;
    }

    .update-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 2px 7px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-size: 10px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .update-body {
      margin: 0 0 8px;
      color: var(--popup-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .update-list {
      margin: 0 0 9px;
      padding-left: 17px;
      color: var(--popup-text);
      font-size: 11px;
      line-height: 1.35;
    }

    .update-list li {
      margin: 3px 0;
    }

    .update-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .update-actions button {
      border: 0;
      border-radius: 6px;
      padding: 7px 9px;
      background: var(--popup-accent);
      color: var(--popup-accent-text);
      font-weight: 700;
      cursor: pointer;
    }

    .update-actions .link-button {
      background: transparent;
      color: var(--popup-muted);
      padding-inline: 0;
    }
  </style>
</head>

<body>
  <h1>Vortex Web</h1>
    <p id="extensionVersion">Version</p>
    <h3>
      Settings:
    </h3>
    <div id="settings">
      <div class="checkbox-wrapper-4">
        <input class="inp-cbx" id="lightMode" type="checkbox" />
        <label class="cbx" for="lightMode"><span>
            <svg width="12px" height="10px">
              <use xlink:href="#check-4"></use>
            </svg></span><span>light mode</span></label>
        <svg class="inline-svg">
          <symbol id="check-4" viewbox="0 0 12 10">
            <polyline points="1.5 6 4.5 9 10.5 1"></polyline>
          </symbol>
        </svg>
      </div>

      <div class="mode-tabs">
        <button id="hostedRelayBtn" type="button">Hosted</button>
        <button id="localRelayBtn" type="button">Local</button>
      </div>

      <div id="hostedPanel" class="setting-row mode-panel">
        <label for="licenseKey">License key</label>
        <input id="licenseKey" type="password" autocomplete="off" placeholder="Customer license key">
      </div>

      <div id="localPanel" class="mode-panel" hidden>
        <div class="setting-row">
          <label for="hubUrl">Local relay URL</label>
          <input id="hubUrl" placeholder="ws://127.0.0.1:27822/ws">
        </div>
      </div>

      <div id="hubStatus"></div>

      <div id="updateCard" class="update-card" hidden>
        <div class="update-header">
          <span id="updateTitle">Update available</span>
          <span id="updatePill" class="update-pill">New</span>
        </div>
        <p id="updateBody" class="update-body"></p>
        <ul id="updateList" class="update-list"></ul>
        <div class="update-actions">
          <button id="openUpdateBtn" type="button">Open repo</button>
          <button id="dismissUpdateBtn" class="link-button" type="button">Dismiss</button>
        </div>
      </div>

      <style>
        .checkbox-wrapper-4 * {
          box-sizing: border-box;
        }

        .checkbox-wrapper-4 .cbx {
          -webkit-user-select: none;
          user-select: none;
          cursor: pointer;
          padding: 6px 8px;
          border-radius: 6px;
          overflow: hidden;
          transition: all 0.2s ease;
          display: inline-block;
        }

        .checkbox-wrapper-4 .cbx:not(:last-child) {
          margin-right: 6px;
        }

        .checkbox-wrapper-4 .cbx:hover {
          background: color-mix(in srgb, var(--popup-accent) 14%, transparent);
        }

        .checkbox-wrapper-4 .cbx span {
          float: left;
          vertical-align: middle;
          transform: translate3d(0, 0, 0);
        }

        .checkbox-wrapper-4 .cbx span:first-child {
          position: relative;
          width: 18px;
          height: 18px;
          border-radius: 4px;
          transform: scale(1);
          border: 1px solid var(--popup-border);
          transition: all 0.2s ease;
          box-shadow: 0 1px 1px var(--popup-shadow);
        }

        .checkbox-wrapper-4 .cbx span:first-child svg {
          position: absolute;
          top: 3px;
          left: 2px;
          fill: none;
          stroke: #fff;
          stroke-width: 2;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-dasharray: 16px;
          stroke-dashoffset: 16px;
          transition: all 0.3s ease;
          transition-delay: 0.1s;
          transform: translate3d(0, 0, 0);
        }

        .checkbox-wrapper-4 .cbx span:last-child {
          padding-left: 8px;
          line-height: 18px;
        }

        .checkbox-wrapper-4 .cbx:hover span:first-child {
          border-color: var(--popup-accent);
        }

        .checkbox-wrapper-4 .inp-cbx {
          position: absolute;
          visibility: hidden;
        }

        .checkbox-wrapper-4 .inp-cbx:checked+.cbx span:first-child {
          background: var(--popup-accent);
          border-color: var(--popup-accent);
          animation: wave-4 0.4s ease;
        }

        .checkbox-wrapper-4 .inp-cbx:checked+.cbx span:first-child svg {
          stroke-dashoffset: 0;
        }

        .checkbox-wrapper-4 .inline-svg {
          position: absolute;
          width: 0;
          height: 0;
          pointer-events: none;
          user-select: none;
        }

        @media screen and (max-width: 640px) {
          .checkbox-wrapper-4 .cbx {
            width: 100%;
            display: inline-block;
          }
        }

        @-moz-keyframes wave-4 {
          50% {
            transform: scale(0.9);
          }
        }

        @-webkit-keyframes wave-4 {
          50% {
            transform: scale(0.9);
          }
        }

        @-o-keyframes wave-4 {
          50% {
            transform: scale(0.9);
          }
        }

        @keyframes wave-4 {
          50% {
            transform: scale(0.9);
          }
        }
      </style>

    </div>
</body>

</html>
